services:
  - type: web
    name: selam-wellness-api
    env: node
    plan: starter
    buildCommand: npm install && npm run db:generate && npm run build:api
    startCommand: npm run start:prod --workspace @selam/api
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: 4000
